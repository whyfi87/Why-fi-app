name: Build WHYFI eSIM APK
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install NDK
        run: echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
      - name: Fix keystore
        run: |
          mkdir -p /home/runner/.config/.android
          
          keytool -genkey -v -keystore /home/runner/.config/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
      - name: Build APK
        run: chmod +x gradlew && ./gradlew :app-unpriv:assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: whyfi-esim-apk
          path: app-unpriv/build/outputs/apk/debug/*.apk
