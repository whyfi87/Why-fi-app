name: Build WHYFI eSIM APK
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install NDK
        run: |
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
      - name: Create keystore directory
        run: mkdir -p ~/.config/.android
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build APK
        run: ./gradlew :app-unpriv:assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: whyfi-esim-apk
          path: app-unpriv/build/outputs/apk/debug/*.apk
